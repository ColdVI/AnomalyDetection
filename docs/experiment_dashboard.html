* { box-sizing: border-box; }
body {
  margin: 0;
  background: var(--bg);

  font-family: var(--sans);

}
.page { max-width: 980px; margin: 0 auto; padding: 28px 20px 80px; }
header.top { display: flex; flex-direction: column; gap: 4px; margin-bottom: 22px; }

header.top p { margin: 0; color: var(--ink-dim); font-size: 0.92rem; }

.stats { display: flex; gap: 10px; flex-wrap: wrap; margin: 18px 0 22px; }
.stat {
  background: var(--bg-elevated); border: 1px solid var(--border); border-radius: 10px;
  padding: 10px 14px; min-width: 108px;
}
.stat .n { font-family: var(--mono); font-variant-numeric: tabular-nums; font-size: 1.3rem; font-weight: 600; }
.stat .l { font-size: 0.74rem; color: var(--ink-dim); text-transform: uppercase; letter-spacing: 0.04em; }

.controls {
  position: sticky; top: 0; z-index: 5; background: var(--bg);
  padding: 10px 0 14px; border-bottom: 1px solid var(--border); margin-bottom: 18px;
  display: flex; flex-direction: column; gap: 10px;
}
.controls input[type="search"] {
  width: 100%; padding: 9px 12px; border-radius: 8px; border: 1px solid var(--border);
  background: var(--bg-elevated); color: var(--ink); font-size: 0.92rem; font-family: var(--sans);
}
.controls input[type="search"]:focus { outline: 2px solid var(--accent); outline-offset: 1px; }
.filter-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
.filter-row select {
  padding: 6px 10px; border-radius: 7px; border: 1px solid var(--border);
  background: var(--bg-elevated); color: var(--ink); font-size: 0.84rem; font-family: var(--sans);
}
.filter-row button.reset {
  padding: 6px 10px; border-radius: 7px; border: 1px solid var(--border); background: transparent;
  color: var(--ink-dim); font-size: 0.8rem; cursor: pointer;
}
.filter-row button.reset:hover { color: var(--ink); border-color: var(--accent); }
.count-line { font-size: 0.8rem; color: var(--ink-dim); }

.card {
  background: var(--bg-elevated); border: 1px solid var(--border); border-radius: 12px;
  padding: 14px 16px; margin-bottom: 12px;
}
.card-head { display: flex; flex-wrap: wrap; align-items: baseline; gap: 8px 10px; }
.pill {
  font-size: 0.7rem; font-weight: 600; padding: 2px 9px; border-radius: 999px;
  letter-spacing: 0.02em; white-space: nowrap;
}
.pill.accepted { background: var(--status-accepted-soft); color: var(--status-accepted); }
.pill.rejected { background: var(--status-rejected-soft); color: var(--status-rejected); }
.pill.mixed { background: var(--status-mixed-soft); color: var(--status-mixed); }
.pill.smoke { background: var(--status-smoke-soft); color: var(--status-smoke); }
.card-id { font-family: var(--mono); font-size: 0.82rem; color: var(--ink-dim); }
.card-date { font-family: var(--mono); font-size: 0.78rem; color: var(--ink-dim); font-variant-numeric: tabular-nums; }
.card-track { font-weight: 600; font-size: 1rem; flex-basis: 100%; margin-top: 2px; }
.card-sub { font-size: 0.84rem; color: var(--ink-dim); flex-basis: 100%; }
.card-sub b { color: var(--ink); font-weight: 600; }
.card-finding { margin-top: 8px; font-size: 0.92rem; }

.card-details { margin-top: 10px; border-top: 1px dashed var(--border); padding-top: 10px; display: none; }
.card.open .card-details { display: block; }
.card-details h4 { margin: 10px 0 4px; font-size: 0.76rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--ink-dim); }
.chips { display: flex; flex-wrap: wrap; gap: 6px; }

  font-family: var(--mono); font-size: 0.76rem; background: var(--accent-soft); color: var(--accent);

.gate-chip { font-family: var(--sans); font-size: 0.78rem; padding: 2px 9px; border-radius: 6px; border: 1px solid var(--border); }

table.metrics { width: 100%; border-collapse: collapse; font-size: 0.82rem; margin-top: 4px; }

table.metrics th { color: var(--ink-dim); font-weight: 600; font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.03em; }
table.metrics td.num { font-family: var(--mono); font-variant-numeric: tabular-nums; text-align: right; }
.table-wrap { overflow-x: auto; }

.notes { font-size: 0.86rem; color: var(--ink-dim); }
.toggle-btn {

.toggle-btn:hover { text-decoration: underline; }
.empty { color: var(--ink-dim); font-size: 0.9rem; padding: 30px 0; text-align: center; }

reached - the three raw tars remain unopened/unhashed. Next step requires user-approved new pre-registration; no post-hoc substitution for the Step-5 candidate is allowed."}, {"id": "ADR-031", "date": "2026-07-14", "track": "Full-volume S2 natural reason burden (data-quality channel)", "method": "S2 declared-status, position-quality, altitude-availability, message-gap channels kept separate from residual penalty/CUSUM", "dataset": "Real ADS-B, full 638 parts, 256,155,009 rows", "columns_or_channels": ["declared-status", "position-quality", "altitude-availability", "message-gap", "NIC", "NACp", "SIL"], "metrics_table": [{"score_or_module": "MESSAGE_GAP (pooled)", "decision_policy": null, "budget_tier": null, "recall": null, "fa_per_hour": 2.890511}, {"score_or_module": "NIC reported-unknown/unavailable (pooled)", "decision_policy": null, "budget_tier": null, "recall": null, "fa_per_hour": 0.528053}, {"score_or_module": "NACp missing (pooled)", "decision_policy": null, "budget_tier": null, "recall": null, "fa_per_hour": 0.195202}, {"score_or_module": "SIL missing (pooled)", "decision_policy": null, "budget_tier": null, "recall": null, "fa_per_hour": 0.195202}, {"score_or_module": "all-altitude-unavailable (pooled)", "decision_policy": null, "budget_tier": null, "recall": null, "fa_per_hour": 0.005083}, {"score_or_module": "declared-status not-corroborated (pooled)", "decision_policy": null, "budget_tier": null, "recall": null, "fa_per_hour": 0.00033}], "thresholds_or_targets": null, "gate_results": {"Adim 7": "pending"}, "status": "analysis_only", "key_finding": "Measured natural (non-attack) data-quality 'reason burden' across the full real dataset (542,461 flight segments, 497,570.9 scoreable flight-hours) separately from the physics-residual penalty/CUSUM channel, explicitly not labeled as attack ground-truth or false-positive rate. MESSAGE_GAP is the dominant natural reason at 2.89 episode/hour pooled; NIC-unknown is next at 0.53/hour; all others are below 0.2/hour. Legacy Silver lacks update-age fields, so all rows are freshness_unknown.", "notes": "Ran on 4 deterministic workers, 638/638 parts, 272.2s. Checksums re-verified (2/2). 54/54 related regression tests passed. Open item: Step 7 corrected-CUSUM truth-v2 evaluation not yet complete; wide regression found 221/222 passing, with the one failure being a frozen adsb/features.py byte-hash mismatch that blocks corrected-CUSUM claims until resolved (fail-closed, not loosened)."}, {"id": "ADR-030", "date": "2026-07-13", "track": "Full-volume streaming baseline (rule+CUSUM natural burden across all 638 parts)", "method": "Rule scorer + CUSUM h=1 streamed across full real ADS-B volume", "dataset": "Real ADS-B, 638 Silver parts, 256,155,009 rows: 2026-02-28 (fit/calibration), 2026-03-01 (development), 2026-03-16 (frozen rehearsal)", "columns_or_channels": ["east_velocity_residual", "north_velocity_residual", "altitude_source_residual (excluded, MAD=0)"], "metrics_table": [{"score_or_module": "Rule diagnostic", "decision_policy": null, "budget_tier": null, "recall": null, "fa_per_hour": 1.171104, "note": "calibration episode/hour"}, {"score_or_module": "Rule diagnostic", "decision_policy": null, "budget_tier": null, "recall": null, "fa_per_hour": 1.061339, "note": "development episode/hour"}, {"score_or_module": "Rule diagnostic", "decision_policy": null, "budget_tier": null, "recall": null, "fa_per_hour": 1.158345, "note": "rehearsal episode/hour"}, {"score_or_module": "CUSUM h=1", "decision_policy": "cusum", "budget_tier": null, "recall": null, "fa_per_hour": 6.071336, "note": "calibration episode/hour; scoreable-flight alarm rate ~0.9912"}, {"score_or_module": "CUSUM h=1", "decision_policy": "cusum", "budget_tier": null, "recall": null, "fa_per_hour": 5.738076, "note": "development episode/hour; scoreable-flight alarm rate ~0.9916"}, {"score_or_module": "CUSUM h=1", "decision_policy": "cusum", "budget_tier": null, "recall": null, "fa_per_hour": 5.326149, "note": "rehearsal episode/hour; scoreable-flight alarm rate ~0.9915"}], "thresholds_or_targets": "engineering-advisory assumption of 12 episode/hour (explicitly NOT an operationally measured requirement)", "gate_results": {"configuration freeze": "REJECTED"}, "status": "development_accepted_operational_rejected", "key_finding": "Ran the rule+CUSUM(h=1) pipeline across the full 638-part / 256.16M-row real dataset successfully (10,588s) but declined to freeze it as the main configuration: CUSUM h=1 natural alarm saturation is too high (99.1-99.2% of scoreable flights alarm at least once; evaluable-row alarm rate ~78-80%), meaning episode-level merging masks a saturated per-row alarm rate. A ~2.1-2.5x burden difference between fast and slow cadence strata is also hidden by episode merging. A correctness-invariant violation was found and audited (V1 raw moving-block p95 5.745749/hr was lower than the observed full-flight rate 6.071336/hr); a conservative upper=max(observed, raw p95) audit revised 9/18 candidates upward but the h=1 selection itself did not change.", "notes": "The 12 episode/hour budget is a pre-registered engineering-advisory assumption for this round, not a measured operational requirement - meeting it alone would not have been sufficient for a pass. East/north MADs 1.736830/1.542729, both axes active. Checksums verified (9/9 index-verified). Truth-v2 CUSUM event recall/delay/coverage not yet measured at this ADR. New h/budget selection requires new user-approved pre-registration and new namespace."}, {"id": "ADR-029", "date": "2026-07-13", "track": "Two-axis velocity residual and causal Page-CUSUM core", "method": "East/north velocity residuals (reported vs derived-from-consecutive-position); per-axis positive/negative Page CUSUM state (adsb/cusum.py)", "dataset": "N/A (infrastructure/feature + algorithm)", "columns_or_channels": ["east_velocity_residual", "north_velocity_residual"], "metrics_table": [], "thresholds_or_targets": "2 m/s vector target, converted to a 2/sqrt(2) per-axis lower bound", "gate_results": {}, "status": "accepted", "key_finding": "Built a causal two-axis Page-CUSUM detector for the previously-weak stealthy position-ramp scenario (ADR-025 flagged this as invisible without accumulation), with strict flight/ground/gap/time reset semantics and prefix-causality. The numerical CUSUM threshold h is deliberately NOT chosen by the core itself - it must be derived from frozen natural-burden calibration in a later step, kept separate from any synthetic-recall-driven selection.", "notes": "30/30 tests passed (test_adsb_cusum.py + test_adsb_features.py). MAD=0 channel excluded without floor. If one axis is missing, serialization reports axis_coverage_status=degraded_axis_coverage, treated as a gate blocker not a pass in later steps. CUSUM channels not yet added to NN PRIMARY_FEATURES; no new NN training done."}, {"id": "ADR-028", "date": "2026-07-13", "track": "Frozen rule scorer re-scored on corrected truth-v2 (Step 3)", "method": "ADR-025's ResidualRuleScorer (unchanged calibration/threshold) re-scored on truth-v2 row-level labels", "dataset": "Synthetic corpus v2", "columns_or_channels": [], "metrics_table": [{"score_or_module": "rule scorer (pooled, truth-v2 corrected)", "decision_policy": null, "budget_tier": null, "recall": null, "fa_per_hour": null, "auroc": 0.764883, "auprc": 0.883313}, {"score_or_module": "rule scorer - dropout recipe", "decision_policy": null, "budget_tier": null, "recall": null, "fa_per_hour": null, "auroc": 0.566965}, {"score_or_module": "rule scorer - ground-speed recipe", "decision_policy": null, "budget_tier": null, "recall": null, "fa_per_hour": null, "auroc": 0.974023}, {"score_or_module": "rule scorer - ramp recipe", "decision_policy": null, "budget_tier": null, "recall": null, "fa_per_hour": null, "auroc": 0.558927}, {"score_or_module": "rule scorer - track recipe", "decision_policy": null, "budget_tier": null, "recall": null, "fa_per_hour": null, "auroc": 0.889552}, {"score_or_module": "rule scorer - vertical-rate recipe", "decision_policy": null, "budget_tier": null, "recall": null, "fa_per_hour": null, "auroc": 0.696337}, {"score_or_module": "rule scorer - ground-speed event recall", "decision_policy": null, "budget_tier": null, "recall": 0.963659, "fa_per_hour": null, "note": "median delay 19.31s"}, {"score_or_module": "rule scorer - track event recall", "decision_policy": null, "budget_tier": null, "recall": 0.951804, "fa_per_hour": null, "note": "median delay 56.75s"}, {"score_or_module": "rule scorer - stealthy ramp event recall", "decision_policy": null, "budget_tier": null, "recall": 0.801347, "fa_per_hour": null, "note": "active-interval micro coverage only 0.183902"}], "thresholds_or_targets": null, "gate_results": {}, "status": "accepted", "key_finding": "Re-scoring the frozen rule scorer on corrected truth-v2 labels (no calibration/threshold changes) gave pooled AUROC/AUPRC 0.764883/0.883313 - well above the ~0.75 proxy-label ceiling identified in ADR-025, confirming the label fix mattered. Ground-speed and track recipes have strong event recall (0.96/0.95) with delays of 19s/57s; the stealthy ramp recipe has high nominal event recall (0.80) but very low active-interval micro-coverage (0.18), meaning detection mostly happens late/briefly relative to the full injected interval. Clean natural-reference rate is 4.808533 episode/hour scoreable, with 89.2% of flights showing at least one alarm at this frozen threshold.", "notes": "No pre-existing NN checkpoint available for a corrected re-score; the old (label-bugged) NN JSON was kept only as historical_label_bugged_no_checkpoint_rescore, no corrected NN claim made. Artifact: artifacts/adsb/runs/20260713_step3_corrected_rule_v1/, regression 18/18 passed. The 0.95 historical score threshold used is NOT an operationally-approved threshold; that comes later with CUSUM in Step 5."}, {"id": "ADR-027", "date": "2026-07-13", "track": "Synthetic interval truth v2 and separate immutable corpus", "method": "adsb/truth.py - row-level injection_active/observable_changed/evaluable_truth separated from event interval; primary label q_w>0", "dataset": "Synthetic corpus v2 (8,910 flights x clean+5 scenarios)", "columns_or_channels": [], "metrics_table": [], "thresholds_or_targets": null, "gate_results": {}, "status": "accepted", "key_finding": "Built interval-truth v2 to fix the same whole-flight-proxy labeling problem flagged in ADR-025 - row-level truth now distinguishes whether an injection is active, whether it is actually observable, and whether it is evaluable, rather than labeling entire post-onset windows anomalous by file. Full corpus (8,910 flights x 6 variants, 26,802,690 rows, 646,160,578 bytes) written fail-if-exists with SHA-256/footer per file; full ADS-B regression 161/161 passed. Of 666,739 active dropout rows, only 570,666 are observable-changed, confirming a naive onset-to-end proxy would have overcounted.", "notes": "V1 files unchanged/untouched. An earlier incomplete synthetic namespace (adsb_v2/) was explicitly marked INCOMPLETE_DO_NOT_USE.md rather than overwritten. Frozen-rule corrected-truth scoring deferred to 'Step 3'; v2 corpus will never be used for fit/train/calibration."}, {"id": "ADR-026", "date": "2026-07-13", "track": "Immutable ADS-B run manifest and provenance contract", "method": "adsb/run_manifest.py - fail-if-exists run_dir, byte/SHA-256/parquet-footer+schema hashing, split hashes, config/git dirty-state, synthetic-path/flight-ID leakage guard", "dataset": "N/A (infrastructure)", "columns_or_channels": [], "metrics_table": [], "thresholds_or_targets": null, "gate_results": {}, "status": "accepted", "key_finding": "Added an immutable run-manifest/provenance system so every ADS-B run is independently hash-verified and auditable; 14/14 new tests passed (9 manifest + 5 evaluation). Found an unresolved row-count discrepancy between manifest provenance footer measurement (256,155,009) and the previously documented total (256,150,550), a +4,459 row gap deliberately recorded as unresolved_do_not_silently_correct rather than silently reconciled.", "notes": "CLI does not auto-discover inputs and carries no holdout/Downloads default. Concrete scoring runs will get their own manifests once frozen config/splits are known; holdout pool not accessed or frozen at this step."}, {"id": "ADR-025", "date": "2026-07-13", "track": "Rule-based penalty scorer (ResidualRuleScorer) - beats NNs + AUC-ceiling finding", "method": "ResidualRuleScorer: per-channel robust z-score (train-normal median/MAD), pen_c=min(max(0,z_c-3),10), uniform weight sum, window-mean score", "dataset": "Synthetic corpus (5 injection recipes) for AUC comparison against NN results from ADR-024", "columns_or_channels": ["altitude_source_residual", "ground_speed_biased channel", "track_frozen channel", "vertical_rate_frozen channel", "position_ramp_stealthy channel", "altitude_dropout channel"], "metrics_table": [{"score_or_module": "Kural (rule scorer, tur 2, pooled)", "decision_policy": null, "budget_tier": null, "recall": null, "fa_per_hour": null, "pooled_auc": 0.6}, {"score_or_module": "Kural - ground_speed_biased", "decision_policy": null, "budget_tier": null, "recall": null, "fa_per_hour": null, "auc": 0.727}, {"score_or_module": "Kural - track_frozen", "decision_policy": null, "budget_tier": null, "recall": null, "fa_per_hour": null, "auc": 0.679}, {"score_or_module": "Kural - vertical_rate_frozen", "decision_policy": null, "budget_tier": null, "recall": null, "fa_per_hour": null, "auc": 0.579}, {"score_or_module": "Kural - position_ramp_stealthy", "decision_policy": null, "budget_tier": null, "recall": null, "fa_per_hour": null, "auc": 0.519}, {"score_or_module": "Kural - altitude_dropout (declared out of scope)", "decision_policy": null, "budget_tier": null, "recall": null, "fa_per_hour": null, "auc": 0.494}], "thresholds_or_targets": null, "gate_results": {}, "status": "accepted", "key_finding": "A simple rule-based penalty scorer (per-channel robust z-score, no learning) beat all three NN architectures on pooled synthetic AUC: 0.600 vs 0.552-0.572 for Dense-AE/LSTM-AE/LSTM-forecaster (ADR-024), especially on track_frozen (0.679 vs best NN 0.523, +0.16). CRITICAL EVALUATION FINDING: timeline plots revealed pre-onset windows of corrupted flights were being labeled anomalous via a whole-file proxy label, capping the best-possible AUC at ~0.75 regardless of detector quality - the same 'whole-flight proxy -> interval truth' bug RFLY-1 found and fixed (ADR-014 correction). Under this proxy label, ground_speed_biased (0.727) and track_frozen (0.679) are effectively near their measurement ceiling.", "notes": "Two-round tuning: round 1 MAD-floor default made altitude_source_residual (MAD=0, 25ft quantization) a hair-trigger (93.8% of normal windows got nonzero penalty, AUC 0.582); round 2 generalized rule (MAD-exactly-0 channels excluded entirely, not floored) gave the 0.600 pooled AUC. Weights uniform w=1, pre-registered, not tuned post-result. Open items: window-label correction + re-measurement (pre-registered label-only fix), CUSUM accumulation for stealthy ramp, full-volume (638 parts + new v2025.06.15 tar), NN weighted-loss experiment still not run."}, {"id": "ADR-024", "date": "2026-07-13", "track": "First full training round (60 parts) + z-score confidence score + literature review", "method": "Dense-AE, LSTM-AE, LSTM-forecaster (USAD excluded, still numerically unstable); masked_mse; z_score_confidence", "dataset": "Real ADS-B (60 Silver parts, train 39,555 flights); synthetic corpus (5 injection scenarios) for AUC evaluation", "columns_or_channels": ["alt", "alt_geom_m", "altitude_source_residual (new)", "nic", "nac_p", "sil"], "metrics_table": [{"score_or_module": "Dense-AE", "decision_policy": null, "budget_tier": null, "recall": null, "fa_per_hour": null, "pooled_auc": 0.572, "magnitude_domination": "FLAGGED (rho=0.86/0.90)"}, {"score_or_module": "LSTM-AE", "decision_policy": null, "budget_tier": null, "recall": null, "fa_per_hour": null, "pooled_auc": 0.568, "magnitude_domination": "FLAGGED (rho=0.84/0.89)"}, {"score_or_module": "LSTM-forecaster", "decision_policy": null, "budget_tier": null, "recall": null, "fa_per_hour": null, "pooled_auc": 0.552, "magnitude_domination": "FLAGGED (rho=0.94/0.92, worst)"}], "thresholds_or_targets": null, "gate_results": {}, "status": "accepted", "key_finding": "Added altitude_source_residual (barometric vs geometric altitude divergence, motivated by literature on self-consistency checks for ADS-B spoofing detection) and a z-score confidence layer. First full 60-part training round: all three trained models were magnitude-domination FLAGGED with pooled AUCs only 0.552-0.572, barely above chance on most scenarios (ground_speed_biased AUC 0.65-0.74; track_frozen/position_ramp_stealthy ~0.51-0.55; altitude_dropout 0.48-0.50, below random in two models). Root cause diagnosed experimentally: masked_mse weights all 8 channels equally, but raw channels (alt, ground_speed_ms, track_deg) have large structured/easy-to-learn variance while residual channels are near-noise in normal flight - equal-weighted loss lets optimization focus on easy/large channels and ignore residual channels, explaining both magnitude-domination and low AUC via one mechanism.", "notes": "altitude_dropout's below-random AUC suspected to be a measurement artifact from masked_mse's denominator shrinking under NaN-masking, not a real inverse signal - unconfirmed, open item. Found and fixed a memory-crash bug (LSTM scoring 2.85M windows in one forward pass wanted ~20.8GB) via _score_batched(); BATCH_SIZE 64->512 cut Dense-AE training from ~36min to ~2.4min estimate. Open items: weighted-loss experiment (3-5x on residual channels) not yet run; USAD still excluded; category-conditional normality noted but untried; S2 rule-channel (squawk/nic/nac_p/sil) not yet written. Plots: artifacts/adsb/plots/."}, {"id": "ADR-023", "date": "2026-07-13", "track": "Persistent synthetic test/validation corpus + parser inventory + shuffle bug fix", "method": "adsb/synthetic.py::save_synthetic_batch persisted synthetic corpus generation using PHYSICS_BREAK_RECIPES; parser inventory audit", "dataset": "Real ADS-B Silver (60 parts, 22,520,807 rows, 18,000 aircraft) -> synthetic corpus", "columns_or_channels": [], "metrics_table": [], "thresholds_or_targets": null, "gate_results": {}, "status": "accepted", "key_finding": "Confirmed a single canonical historical adsb.lol tar parser (parse_trace_bytes) is used consistently across both independent attempts (current and archived Codex version) with identical unit conversions - no inconsistency found. Built a persistent, reusable synthetic corpus (8,910 val flights x clean+5 recipes, 4,467,115 rows each, 765MB total) replacing a previous in-memory-only, throwaway synthetic generation. Found and fixed a real bug: np.random.Generator.shuffle() silently mishandled pandas ArrowStringArray from .unique() - harmless at small scale (3 parts, 2440 flights, tested) but unverified at scale; fixed by converting to plain numpy object arrays in both the synthetic-dataset script and the real training script's train/val split.", "notes": "Design changed from one-file-per-flight-per-recipe (~59,000 tiny files, too slow on Windows) to one consolidated file per recipe. Open item: seg[seg['flight_id']==fid] full-table scan per flight took ~25 min for 8910 flights; needs seg.groupby('flight_id') at full 638-part scale to avoid super-linear blowup."}, {"id": "ADR-022", "date": "2026-07-10", "track": "ADS-B reset + first real 3-day model round (Dense-AE/LSTM-AE/USAD/LSTM-forecaster)", "method": "Dense-AE, LSTM-AE, USAD, LSTM-forecaster trained on real ADS-B data; magnitude_domination_check diagnostic", "dataset": "Real ADS-B (adsb.lol), 3 days: v2026.02.28, v2026.03.01, v2026.03.16 (~3GB each, 256,150,550 rows total, 638 Silver parts)", "columns_or_channels": ["alt", "vertical_rate_ms"], "metrics_table": [], "thresholds_or_targets": null, "gate_results": {}, "status": "smoke_only", "key_finding": "First real-data training round found LSTM-AE (rho=0.919), USAD (rho=0.986), and LSTM-forecaster (rho=0.890) all magnitude-flagged; only Dense-AE (rho=0.086) was clean - root cause was completely unscaled features (alt in thousands, vertical_rate_ms single-digit). After adding ClippedRobustScaler (clip=5.0, train-only fit) and gradient clipping, a second round flagged Dense-AE instead (rho=0.81/0.83) while LSTM-AE became borderline-clean (rho=0.77/0.80) and USAD's rho dropped (~-0.05) but its loss STILL numerically exploded (23 billion) - meaning the rho diagnostic alone is insufficient; training-stability must be separately monitored (not yet added). Synthetic-corruption validation showed Dense-AE/LSTM-AE/LSTM-forecaster detected corrupt>clean in 5/5 scenarios but effect size varied hugely (ground_speed_biased strong 2.3x-10.75x; position_ramp/track/altitude_dropout weak 1.01x-1.17x, practically indistinguishable); USAD scored 0/5 due to exploded training.", "notes": "Two independent, uncoordinated efforts (src/adsb/ by Claude, src/adsb_behavioral/ by Codex) both attempted the same problem; Codex's version got 97.6% synthetic recall but 25.54 false-alarms/hour on natural data (unusable). Both archived to archive/2026-07-10_{legacy_non_adsb_ml,rejected_adsb_attempts}/; old ML-0..16/RFLY track also archived. New unified adsb/ (root-level) track started. Only 10/638 Silver parts (3000 aircraft) used, not full volume. Blind holdout not yet defined."}, {"id": "ADR-021", "date": "2026-07-10", "track": "ADSB-0 - new ADS-B physics-consistency residual track (segmentation + physics infra)", "method": "Arithmetic physical-consistency residuals (reported channel vs derived-from-raw-lat/lon/alt counterpart); no learned model", "dataset": "adsb.lol/readsb ADS-B telemetry (real-data access blocked this session; synthetic data used for dev/test)", "columns_or_channels": ["vertical_rate_residual", "speed_residual", "heading_residual", "turn_bank_residual (roll_deg-dependent, ~8.5% coverage)"], "metrics_table": [], "thresholds_or_targets": null, "gate_results": {}, "status": "smoke_only", "key_finding": "After 9 methods (IF, LightGBM, Chronos, LSTM-AE, Dense-AE, USAD, magnitude-normalized score, drift-calibrated fusion) all failed Gate C on SEAD/RFLY with root cause traced to a small/heterogeneous normal pool plus magnitude-domination artifact, a new parallel track was started: arithmetic physics-consistency residuals on ADS-B telemetry instead of a learned model, a design where magnitude-domination cannot structurally arise. Segmentation, physics-residual, and injection code was written and unit-tested entirely on synthetic data (329 passed, 6 skipped); real ADS-B data access was blocked this session (MinIO/Docker unavailable on this machine; real parsed data exists only on a teammate's machine).", "notes": "EARTH_RADIUS_M constant mismatch (WGS84 111320 m/deg vs haversine 6371km) initially created a spurious systematic residual in tests, fixed. Named ADSB-0/ADSB-1 to avoid namespace collision with ML-N/RFLY-N, entirely new src/adsb/ package. Not yet written: visualization gallery, real-data validation of new_leg_agreement rate, ADSB-0 phase gate closure. Plans: docs/ADSB0_INGEST_SEGMENT_PLAN.md, docs/ADSB1_PHYSICS_DETECTOR_PLAN.md (ADSB-1 target: recall>=0.70 @ FA<=0.05, pre-registered)."}, {"id": "ADR-020", "date": "2026-07-10", "track": "ML-15 session-jackknife drift calibration, full 5-seed matrix", "method": "Parallelized session-jackknife drift calibration wrapper (joblib) around Threshold/K-of-N/CUSUM policies; algorithm/thresholds/budgets unchanged from ADR-015", "dataset": "UAV-SEAD", "columns_or_channels": [], "metrics_table": [{"score_or_module": "existing_fusion (median FA/hr across seeds)", "decision_policy": "cusum", "budget_tier": "advisory", "recall": null, "fa_per_hour": 8.749953, "note": "5/5 seeds passed"}, {"score_or_module": "existing_f uly removed, no operationally useful signal remains underneath; the problem is weak underlying learned signal, not architecture choice.", "notes": "Full rho table (5-seed avg, artifacts/ml16_kol_n/summary.json): LSTM rankpct trained-vs-random rho ~0.81, trained-vs-magnitude ~0.79; LSTM relerr ~0.15/~-0.09; Dense-AE rankpct ~0.83/~0.83; Dense-AE relerr ~0.55/~0.23; USAD rankpct ~0.72/~0.80; USAD relerr ~0.37/~0.13 (baseline raw-score rho ~0.96-0.97 all three, per ADR-016). docs/ML_YETERSIZLIKLER_KAYDI.md B.5 updated but not closed - reframed as 'clipping/normalizing the score alone does not fix it, the underlying signal is already weak.'"}, {"id": "ADR-018", "date": "2026-07-09/10", "track": "ML-16 Kol U - SEAD USAD (adversarial dual-autoencoder)", "method": "USAD (shared encoder E + two decoders D1/D2, published two-phase adversarial loss), same pipeline/windowing as ADR-016/017", "dataset": "UAV-SEAD", "columns_or_channels": [], "metrics_table": [{"score_or_module": "usad_score", "decision_policy": "cusum", "budget_tier": "advisory", "recall": 0.242, "fa_per_hour": 14.21}, {"score_or_module": "usad_score", "decision_policy": "cusum", "budget_tier": "critical", "recall": 0.08, "fa_per_hour": 3.18}, {"score_or_module": "usad_score", "decision_policy": "k_of_n", "budget_tier": "advisory", "recall": 0.208, "fa_per_hour": 15.61}, {"score_or_module": "usad_score", "decision_policy": "k_of_n", "budget_tier": "critical", "recall": 0.194, "fa_per_hour": 4.24}, {"score_or_module": "usad_score", "decision_policy": "threshold", "budget_tier": "advisory", "recall": 0.233, "fa_per_hour": 16.86}, {"score_or_module": "usad_score", "decision_policy": "threshold", "budget_tier": "critical", "recall": 0.217, "fa_per_hour": 2.87}, {"score_or_module": "usad_ml14_fusion", "decision_policy": "cusum", "budget_tier": "advisory", "recall": 0.124, "fa_per_hour": 10.02}, {"score_or_module": "usad_ml14_fusion", "decision_policy": "cusum", "budget_tier": "critical", "recall": 0.043, "fa_per_hou const STATUS_LABEL = {
  accepted: "Kabul edildi",
  rejected: "Reddedildi",
  development_accepted_operational_rejected: "Gelistirmede kabul / Operasyonel red",
  smoke_only: "On-deneme",
  analysis_only: "Analiz / on-kayit",
};
const STATUS_CLASS = {
  accepted: "accepted",
  rejected: "rejected",
  development_accepted_operational_rejected: "mixed",
  smoke_only: "smoke",
  analysis_only: "smoke",
};

function statusLabel(s) { return STATUS_LABEL[s] || (s || "Bilinmiyor"); }
function statusClass(s) { return STATUS_CLASS[s] || "smoke"; }

function uniqueSorted(values) {
  return [...new Set(values.filter(Boolean))].sort((a, b) => a.localeCompare(b, "tr"));
}

function populateSelect(id, values) {
  const sel = document.getElementById(id);
  for (const v of values) {
    const opt = document.createElement("option");
    opt.value = v; opt.textContent = v;
    sel.appendChild(opt);
  }
}

function renderStats() {
  const total = DATA.length;
  const counts = {};
  for (const e of DATA) {
    const k = e.status || "unknown";
    counts[k] = (counts[k] || 0) + 1;
  }
  const items = [["Toplam kayit", total, null]];
  for (const k of Object.keys(STATUS_LABEL)) {
    if (counts[k]) items.push([statusLabel(k), counts[k], statusClass(k)]);
  }
  const el = document.getElementById("stats");
  el.innerHTML = items.map(([label, n, cls]) => `
    <div class="stat">
      <div class="n" style="${cls ? `color:var(--status-${cls})` : ""}">${n}</div>
      <div class="l">${label}</div>
    </div>`).join("");
}

function fmtNum(n) {
  if (n === null || n === undefined) return "—";
  return typeof n === "number" ? n.toString() : n;
}

function renderMetricsTable(rows) {
  if (!rows || rows.length === 0) return "";
  const hasRho = rows.some(r => r.rho !== undefined && r.rho !== null);
  return `<h4>Sonuc tablosu</h4><div class="table-wrap"><table class="metrics">
    <thead><tr>
      <th>Skor / modul</th><th>Karar politikasi</th><th>Butce / seviye</th>
      <th>Recall</th><th>FA / saat</th>${hasRho ? "<th>rho</th>" : ""}
    </tr></thead>
    <tbody>
      ${rows.map(r => `<tr>
        <td>${r.score_or_module ?? "—"}</td>
        <td>${r.decision_policy ?? "—"}</td>
        <td>${r.budget_tier ?? "—"}</td>
        <td class="num">${fmtNum(r.recall)}</td>
        <td class="num">${fmtNum(r.fa_per_hour)}</td>
        ${hasRho ? `<td class="num">${fmtNum(r.rho)}</td>` : ""}
      </tr>`).join("")}
    </tbody>
  </table></div>`;
}

function renderGates(gates) {
  if (!gates || Object.keys(gates).length === 0) return "";
  const chips = Object.entries(gates).map(([k, v]) => {
    const vs = String(v).toUpperCase();
    let color = "var(--ink-dim)";
    if (vs.includes("PASS") || vs.includes("GEC")) color = "var(--status-accepted)";
    else if (vs.includes("FAIL") || vs.includes("KALD")) color = "var(--status-rejected)";
    return `<span class="gate-chip" style="color:${color};border-color:${color}">${k}: ${v}</span>`;
  }).join(" ");
  return `<h4>Gate sonuclari</h4><div class="chips">${chips}</div>`;
}

function renderCard(e, idx) {
  const cols = (e.columns_or_channels || []).map(c => `<span class="chip">${c}</span>`).join("");
  const metricsHtml = renderMetricsTable(e.metrics_table);
  const gatesHtml = renderGates(e.gate_results);
  const hasDetails = cols || metricsHtml || gatesHtml || e.thresholds_or_targets || e.notes;
  return `
    <div class="card" id="card-${idx}">
      <div class="card-head">
        <span class="pill ${statusClass(e.status)}">${statusLabel(e.status)}</span>
        <span class="card-id">${e.id || ""}</span>
        <span class="card-date">${e.date || ""}</span>
        <div class="card-track">${e.track || ""}</div>
        <div class="card-sub"><b>${e.method || "—"}</b> · ${e.dataset || "—"}</div>
      </div>
      ${e.key_finding ? `<div class="card-finding">${e.key_finding}</div>` : ""}
      ${hasDetails ? `<button class="toggle-btn" onclick="document.getElementById('card-${idx}').classList.toggle('open')">Detaylari goster / gizle</button>` : ""}
      <div class="card-details">
        ${cols ? `<h4>Kolonlar / kanallar</h4><div class="chips">${cols}</div>` : ""}
        ${e.thresholds_or_targets ? `<h4>Esik / hedef</h4><div class="notes">${e.thresholds_or_targets}</div>` : ""}
        ${gatesHtml}
        ${metricsHtml}
        ${e.notes ? `<h4>Notlar</h4><div class="notes">${e.notes}</div>` : ""}
      </div>
    </div>`;
}

function applyFilters() {
  const q = document.getElementById("search").value.trim().toLowerCase();
  const track = document.getElementById("f-track").value;
  const method = document.getElementById("f-method").value;
  const dataset = document.getElementById("f-dataset").value;
  const status = document.getElementById("f-status").value;

  const filtered = DATA.filter(e => {
    if (track && e.track !== track) return false;
    if (method && e.method !== method) return false;
    if (dataset && e.dataset !== dataset) return false;
    if (status && e.status !== status) return false;
    if (q) {
      const hay = [
        e.id, e.track, e.method, e.dataset, e.key_finding, e.notes,
        ...(e.columns_or_channels || []),
      ].join(" ").toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });

  document.getElementById("list").innerHTML =
    filtered.length ? filtered.map((e, i) => renderCard(e, i)).join("")
                     : `<div class="empty">Bu filtrelerle eslesen kayit yok.</div>`;
  document.getElementById("count-line").textContent =
    `${filtered.length} / ${DATA.length} kayit gosteriliyor`;
}

populateSelect("f-track", uniqueSorted(DATA.map(e => e.track)));
populateSelect("f-method", uniqueSorted(DATA.map(e => e.method)));
populateSelect("f-dataset", uniqueSorted(DATA.map(e => e.dataset)));
populateSelect("f-status", Object.keys(STATUS_LABEL).filter(k => DATA.some(e => e.status === k)));
document.getElementById("f-status").querySelectorAll("option:not(:first-child)").forEach(o => {
  o.textContent = statusLabel(o.value);
});

for (const id of ["f-track", "f-method", "f-dataset", "f-status"]) {
  document.getElementById(id).addEventListener("change", applyFilters);
}
document.getElementById("search").addEventListener("input", applyFilters);
document.getElementById("reset").addEventListener("click", () => {
  document.getElementById("search").value = "";
  for (const id of ["f-track", "f-method", "f-dataset", "f-status"]) {
    document.getElementById(id).value = "";
  }
  applyFilters();
});

renderStats();
applyFilters();
</script>
