services:
  # ONEMLI: Zookeeper KALDIRILDI -- Kafka artik KRaft modunda (kendi
  # kendini yonetiyor, ayri bir koordinasyon servisi gerekmiyor). Zookeeper
  # sadece lokal/native kurulumun bir kalintisiydi (bkz. Dashboard/
  # FULL_PROJECT_HANDOFF.md Bolum 6.3), Docker'da tek-broker icin gereksiz
  # bir servis + ekstra ~512MB RAM demekti. KRaft, Kafka'nin kendisinin
  # onerdigi/varsayilan yolu (Zookeeper 4.0'da tamamen kaldiriliyor).
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    profiles: ["streaming"]
    ports:
      - "29092:29092"   # host erisimi (Windows'tan test/GUI araclari icin)
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      # Tek node kendi kendinin controller'i (quorum voter'i) -- sabit,
      # herkeste ayni CLUSTER_ID/veri dizini kullanildigi surece degismez.
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      CLUSTER_ID: tV5djcsiQ1ql2me9Hh6M_Q
      # Iki ayri client listener zorunlu: container'lar birbirine
      # "kafka:9092" ile baglanir, host/LAN tarafi PLAINTEXT_HOST'u kullanir.
      # Tek listener (eskiden PLAINTEXT://localhost:9092) container-ici
      # client'lari kirar -- broker metadata'da "localhost" dondugunde
      # producer/consumer container'lari KENDI icini isaret eder, broker'a
      # degil (klasik Kafka+Docker hatasi). CONTROLLER, KRaft'in kendi ic
      # haberlesmesi icin -- ayri, client'lara kapali.
      #
      # ONEMLI: PLAINTEXT_HOST artik "localhost" DEGIL, KAFKA_LAN_HOST
      # (repo kokundeki .env dosyasindan, varsayilan localhost) -- boylece
      # ayni Wi-Fi/LAN'daki baska bir makine (orn. takim arkadasi) de bu
      # Kafka'ya "iki kere adsb.lol'e istek atmadan" baglanabiliyor
      # (bkz. proje sohbet gecmisi -- ayni agdan iki bagimsiz producer
      # adsb.lol'u zorluyordu). "localhost" ile denemek YEREL makineden
      # HALA calisir (Windows kendi LAN IP'sine kendi kendine baglanabilir),
      # bu yuzden .env yoksa/bos ise eski davranis (localhost) korunur.
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://${KAFKA_LAN_HOST:-localhost}:29092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka_data:/var/lib/kafka/data
    deploy:
      resources:
        limits:
          # ONEMLI: 1g -> 2g (bkz. proje sohbet gecmisi) -- Kafka surekli
          # %94-97 doluluk civarinda seyrediyordu (JVM heap + off-heap
          # page cache/network buffer'lar 1GB'a fazla sikisiyor), OOM-kill
          # riski yakindi. Host'ta bolca bos kapasite var (o an sadece
          # ~1.9GB/33.7GB kullanimdaydi), bu yuzden guvenli bir artis.
          memory: 2g

  redis:
    image: redis:7-alpine
    profiles: ["streaming"]
    ports:
      - "6379:6379"
    deploy:
      resources:
        limits:
          memory: 256m

  influxdb:
    image: influxdb:2.7
    profiles: ["streaming"]
    ports:
      - "8086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: admin12345
      DOCKER_INFLUXDB_INIT_ORG: iha-org
      DOCKER_INFLUXDB_INIT_BUCKET: uav-history
      DOCKER_INFLUXDB_INIT_RETENTION: 168h
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: iha-influx-token-docker
    volumes:
      - influxdb_data:/var/lib/influxdb2
    deploy:
      resources:
        limits:
          memory: 1g

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      # ONEMLI: sabit "D:/docker-volumes/minio" burada SABIT KALMAMALI --
      # her takim arkadasinin makinesinde D: suruculu bir yol olmayabilir
      # (bu makinede yok, bkz. proje sohbet gecmisi -- ilk kez tam bunun
      # icin "minio_data" adli Docker-yonetimli volume'e cevrilmisti, ama
      # baska bir takim arkadasinin D:'li makinesinden gelen bir commit
      # bunu geri D:/... yoluna cevirdi -- iki makine surekli birbirini
      # EZERDI). KOK COZUM: MINIO_DATA_PATH .env degiskeni (KAFKA_LAN_HOST
      # ile ayni desen) -- bos/tanimsizsa Docker'in KENDI yonettigi
      # "minio_data" adli volume kullanilir (HERKESTE calisir, varsayilan
      # guvenli); D: suruculu bir yol tercih eden biri KENDI .env'ine
      # "MINIO_DATA_PATH=D:/docker-volumes/minio" yazabilir, bu ARTIK
      # git'e gitmiyor (.env gitignored), commit çakışması bitiyor.
      - ${MINIO_DATA_PATH:-minio_data}:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1g

  # --------------------------------------------------------------------
  # Dashboard servisleri (Dashboard/) -- adsb.lol -> Kafka -> Redis/InfluxDB
  # -> Dash. Detay/gecmis: Dashboard/FULL_PROJECT_HANDOFF.md ve
  # Dashboard/HANDOFF_UPDATE_2026-07-07.md. Dorduncu servis (dashboard-app)
  # icindeki FastAPI'ye "localhost:8000" ile erisir -- FastAPI+Dash AYNI
  # process'te (app.py) calistigi icin bu kasitli, degistirilmemeli.
  # --------------------------------------------------------------------
  uav-producer:
    build:
      context: ./Dashboard
    image: iha-dashboard:local
    profiles: ["streaming"]
    restart: unless-stopped
    environment:
      KAFKA_BOOTSTRAP: kafka:9092
      # ONEMLI: veri kaynagi (adsb.lol/OpenSky) dashboard'dan canli
      # degistirilebilsin diye -- producer bunu opsiyonel bir kontrol
      # kanali olarak kullaniyor, erisilemezse sessizce yok sayiyor
      # (bkz. uav_producer.py modul docstring'i).
      REDIS_HOST: redis
      # OpenSky OAuth2 -- .env dosyasindan (GIT'E GITMEZ, bkz. .gitignore).
      # Bos/yanlissa producer SESSIZCE anonim erisime duser.
      OPENSKY_CLIENT_ID: ${OPENSKY_CLIENT_ID:-}
      OPENSKY_CLIENT_SECRET: ${OPENSKY_CLIENT_SECRET:-}
    depends_on:
      - kafka
      - redis
    command: ["python", "uav_producer.py"]

  dashboard-consumer:
    build:
      context: ./Dashboard
    image: iha-dashboard:local
    profiles: ["streaming"]
    restart: unless-stopped
    environment:
      KAFKA_BOOTSTRAP: kafka:9092
      REDIS_HOST: redis
      INFLUX_HOST: http://influxdb:8086
      INFLUX_ORG: iha-org
      INFLUX_BUCKET: uav-history
      INFLUX_TOKEN: iha-influx-token-docker
    depends_on:
      - kafka
      - redis
      - influxdb
    command: ["python", "dashboard_consumer.py"]

  dashboard-app:
    build:
      context: ./Dashboard
    image: iha-dashboard:local
    profiles: ["streaming"]
    restart: unless-stopped
    environment:
      REDIS_HOST: redis
      INFLUX_HOST: http://influxdb:8086
      INFLUX_ORG: iha-org
      INFLUX_BUCKET: uav-history
      INFLUX_TOKEN: iha-influx-token-docker
    ports:
      - "8000:8000"
      - "8050:8050"
    depends_on:
      - redis
      - influxdb
    command: ["python", "app.py"]

  minio-archiver:
    build:
      context: ./Dashboard
    image: iha-dashboard:local
    profiles: ["streaming"]
    restart: unless-stopped
    environment:
      KAFKA_BOOTSTRAP: kafka:9092
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
    depends_on:
      - kafka
      - minio
    command: ["python", "minio_archiver.py"]

volumes:
  influxdb_data:
  kafka_data:
  minio_data:
